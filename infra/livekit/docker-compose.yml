# Self-hosted LiveKit for Sora party-room audio — single-node stack.
# host networking is required: WebRTC hands out real UDP ports to clients.
services:
  caddy:
    image: livekit/caddyl4
    command: run --config /etc/caddy.yaml --adapter yaml
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./caddy.yaml:/etc/caddy.yaml
      - caddy_data:/data

  redis:
    image: redis:7-alpine
    command: redis-server --bind 127.0.0.1
    restart: unless-stopped
    network_mode: host

  livekit:
    image: livekit/livekit-server:latest
    command: --config /etc/livekit.yaml
    restart: unless-stopped
    network_mode: host
    volumes:
      - ./livekit.yaml:/etc/livekit.yaml
    depends_on:
      - redis

volumes:
  caddy_data:
